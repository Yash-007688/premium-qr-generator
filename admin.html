<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Web | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--panel-bg);
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .table-section {
            margin-bottom: 3rem;
        }

        .table-section h3 {
            margin-bottom: 1rem;
            color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--input-bg);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: rgba(99, 102, 241, 0.1);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        td {
            font-size: 0.95rem;
        }

        .action-btn {
            padding: 0.5rem 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background-color: var(--primary-hover);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body class="landing-body">
    
    <nav class="dashboard-nav">
        <div class="logo">✨ QR Web Admin</div>
        <a href="dashboard.html" class="logout-btn">Back to Dashboard</a>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Admin Dashboard</h2>
            <button id="refresh-btn" class="action-btn">Refresh Data</button>
        </div>

        <div class="table-section">
            <h3>👥 Registered Users (Auth)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date Joined</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>User ID</th>
                    </tr>
                </thead>
                <tbody id="auth-table-body">
                    <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="table-section">
            <h3>📶 Wi-Fi Hotspots</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Created By</th>
                        <th>Network (SSID)</th>
                        <th>Template</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="wifi-table-body">
                    <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="table-section">
            <h3>🔗 Links & URLs</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Created By</th>
                        <th>URL</th>
                        <th>Template</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="link-table-body">
                    <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="supabase.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="admin.js"></script>
</body>
</html>
