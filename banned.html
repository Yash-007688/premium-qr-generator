<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Suspended</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
    <!-- Floating Theme Toggle -->
    <button id="floating-theme-toggle" class="nav-theme-toggle-btn" style="position: fixed; top: 1.5rem; right: 1.5rem; z-index: 1000;" aria-label="Toggle theme">
        <span class="theme-icon-light">☀️</span>
        <span class="theme-icon-dark">🌙</span>
    </button>
    
    <div class="suspended-container">
        <span class="suspended-icon">🚫</span>
        <h2>Account Suspended</h2>
        
        <div id="banned-type" style="font-size: 0.95rem; text-transform: uppercase; margin-bottom: -0.5rem;">
            <!-- Rendered by JS -->
        </div>

        <p class="suspended-text" style="margin: 0.5rem 0;">
            Reason: <strong id="banned-reason" style="color: var(--text-main);">--</strong>
        </p>

        <p class="suspended-text" id="banned-details" style="font-size: 0.9rem; background: rgba(0,0,0,0.25); padding: 1rem; border-radius: 0.75rem; border: 1px solid var(--border-color); line-height: 1.5;">
            <!-- Rendered by JS -->
        </p>

        <p class="suspended-text" style="font-size: 0.85rem; margin-top: 0.25rem;">
            If you believe this suspension is an error, please reach out to our administration team for appeal.
        </p>

        <a href="mailto:yashrajmoolchandani@gmail.com?subject=Account Suspension Appeal" class="primary-btn" style="margin: 1.25rem auto 0.5rem auto; max-width: 280px; text-decoration: none; background: linear-gradient(135deg, #ef4444, #ea580c); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
            ✉️ Email Support
        </a>

        <div style="height: 1px; background-color: var(--border-color); margin: 0.5rem 0;"></div>
        
        <div class="suspended-footer">
            <a href="index.html">Return to Home Page</a>
        </div>
    </div>

    <!-- Script imports to force session cleanup in background -->
    <script src="env.config.example.js"></script>
    <script src="env.config.js"></script>
    <script src="supabase.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="auth-utils.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            // Parse parameters from redirect URL
            const params = new URLSearchParams(window.location.search);
            const reason = decodeURIComponent(params.get('reason') || 'No reason specified');
            const type = decodeURIComponent(params.get('type') || 'permanent');
            const until = params.get('until');

            // Render reason
            document.getElementById('banned-reason').innerText = reason;

            // Render type and duration
            const typeEl = document.getElementById('banned-type');
            const detailsEl = document.getElementById('banned-details');

            if (type === 'temporary' && until) {
                const expiry = new Date(until);
                typeEl.innerHTML = `<span style="color: #f97316; font-weight: 600; letter-spacing: 0.05em;">TEMPORARY SUSPENSION</span>`;
                
                // Active countdown ticker
                const updateCountdown = () => {
                    const diffMs = expiry - new Date();
                    if (diffMs <= 0) {
                        detailsEl.innerHTML = `<span style="color: #4ade80; font-weight:600;">Your ban has expired! Please reload the page to sign back in.</span>`;
                        return;
                    }
                    
                    const totalSecs = Math.floor(diffMs / 1000);
                    const days = Math.floor(totalSecs / 86400);
                    const hours = Math.floor((totalSecs % 86400) / 3600);
                    const minutes = Math.floor((totalSecs % 3600) / 60);
                    const seconds = totalSecs % 60;
                    
                    detailsEl.innerHTML = `Suspension lifts in: <strong style="color:var(--text-main); font-size:1.05rem;">${days}d ${hours}h ${minutes}m ${seconds}s</strong><br>` +
                                           `<span style="font-size: 0.78rem; color: var(--text-muted); display:inline-block; margin-top:0.4rem;">Lift date: ${expiry.toLocaleString()}</span>`;
                };
                
                updateCountdown();
                setInterval(updateCountdown, 1000);
            } else {
                typeEl.innerHTML = `<span style="color: #ef4444; font-weight: 600; letter-spacing: 0.05em;">PERMANENT SUSPENSION</span>`;
                detailsEl.innerText = "This suspension is permanent. Access to this platform will not be restored automatically.";
            }

            try {
                // Instantly clean up local session credentials
                await supabaseClient.auth.signOut();
            } catch (err) {
                console.error("Token revocation failed:", err);
            }

            // Floating Theme Toggle Logic
            const toggle = document.getElementById('floating-theme-toggle');
            if (toggle) {
                toggle.addEventListener('click', () => {
                    const currentTheme = localStorage.getItem('theme') || 'dark';
                    if (currentTheme === 'light') {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'light');
                        localStorage.setItem('theme', 'light');
                    }
                });
            }
        });
    </script>
</body>
</html>
