<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Web | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-body {
            background: #0a0a0f;
            background-image:
                radial-gradient(ellipse 80% 50% at 80% -20%, rgba(168,85,247,0.25) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 20% 110%, rgba(99,102,241,0.2) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container { width: 100%; max-width: 440px; padding: 1.5rem; }
        .auth-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.75rem;
            padding: 2.75rem 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .auth-brand {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .auth-brand .logo-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 20px rgba(168,85,247,0.6));
        }
        .auth-brand h1 {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .auth-card h2 {
            font-size: 1.75rem;
            font-weight: 800;
            text-align: center;
            color: #f8fafc;
            margin-bottom: -0.25rem;
        }
        .auth-subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
        }
        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.85rem 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 0.75rem;
            color: #e2e8f0;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .google-btn:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.25);
            transform: translateY(-1px);
        }
        .google-btn svg { flex-shrink: 0; }
        .or-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #334155;
            font-size: 0.8rem;
        }
        .or-divider::before, .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-group label { font-size: 0.82rem; font-weight: 500; color: #64748b; }
        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 0.65rem;
            background: rgba(15,23,42,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .input-group input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
        }
        .input-group input::placeholder { color: #334155; }
        .primary-btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
            margin-top: 0.25rem;
        }
        .primary-btn:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99,102,241,0.4);
        }
        .primary-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .auth-footer {
            text-align: center;
            font-size: 0.88rem;
            color: #475569;
        }
        .auth-footer a { color: #818cf8; text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
        .auth-error {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            display: none;
        }
        #signup-form { display: flex; flex-direction: column; gap: 1rem; }
        .terms-note {
            font-size: 0.78rem;
            color: #334155;
            text-align: center;
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-brand">
                <span class="logo-icon">✨</span>
                <h1>QR Web</h1>
            </div>

            <h2>Create an Account</h2>
            <p class="auth-subtitle">Join us to generate unlimited QR codes</p>

            <form id="signup-form">
                <div id="signup-error" class="auth-error"></div>
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <button type="submit" class="primary-btn">Create Account</button>
            </form>

            <p class="terms-note">By signing up, you agree to our Terms of Service.</p>
            <p class="auth-footer">Already have an account? <a href="login.html">Log In</a></p>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="auth-utils.js"></script>
    <script src="auth.js"></script>
</body>
</html>
