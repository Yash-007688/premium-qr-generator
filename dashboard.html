<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Web | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="qr-code-styling.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="IMG/9c5f4d5b-152d-4d34-b2bd-4aa411d5f4d2.png" type="image/png">
</head>
<body>

    <div class="app-container">
        
        <!-- Top Navigation -->
        <nav class="dashboard-nav">
            <div class="logo"><img src="IMG/9c5f4d5b-152d-4d34-b2bd-4aa411d5f4d2.png" class="site-logo" alt="QR Web logo"><span>✨ QR Web Dashboard</span></div>
            <!-- Unified Dropdown injected by auth-utils.js -->
        </nav>

        <!-- Main Workspace -->
        <div class="dashboard-content">
            <!-- Controls Panel -->
            <aside class="controls-panel">
                <!-- Premium Console Header -->
                <div class="header" style="border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 1rem; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <div class="logo" style="font-size:1.15rem; font-weight:700; background:linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:1px; text-transform:uppercase;">Studio Lab</div>
                        <p style="font-size:0.75rem; color:var(--text-muted); margin-top:0.15rem;">Configure your poster</p>
                    </div>
                    <div style="display: flex; align-items: center; gap: 0.4rem; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); padding: 0.35rem 0.65rem; border-radius: 2rem;">
                        <span style="display: inline-block; width: 6px; height: 6px; background-color: #22c55e; border-radius: 50%; animation: pulseGreen 2s infinite;"></span>
                        <span style="font-size: 0.65rem; color: #4ade80; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;">ACTIVE</span>
                    </div>
                </div>

                <!-- Tab Navigation -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="wifi">Wi-Fi / Hotspot</button>
                    <button class="tab-btn" data-tab="url">Website URL</button>
                </div>

                <!-- Wi-Fi / Hotspot Form -->
                <div id="wifi-form" class="form-section active">

                    <!-- WiFi / Hotspot type toggle -->
                    <div class="wifi-type-toggle">
                        <button class="wtype-btn active" id="wtype-wifi" data-wtype="wifi">
                            📶 Wi-Fi
                        </button>
                        <button class="wtype-btn" id="wtype-hotspot" data-wtype="hotspot">
                            📱 Hotspot
                        </button>
                    </div>

                    <div class="input-group">
                        <label for="ssid" id="ssid-label">Network Name (SSID)</label>
                        <input type="text" id="ssid" class="form-input" placeholder="e.g. MyHomeNetwork" value="JKM_24">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Enter password" value="9752753462">
                    </div>
                    <div class="input-group">
                        <label for="encryption">Security Type</label>
                        <select id="encryption" class="form-input">
                            <option value="WPA" selected>WPA/WPA2/WPA3</option>
                            <option value="WEP">WEP</option>
                            <option value="nopass">None</option>
                        </select>
                    </div>
                </div>

                <!-- URL Form -->
                <div id="url-form" class="form-section">
                    <div class="input-group">
                        <label for="url">Website URL</label>
                        <input type="url" id="url" class="form-input" placeholder="https://example.com" value="https://google.com">
                    </div>
                </div>

                <!-- Colors Section -->
                <div class="section-title">Colors</div>
                <div class="color-pickers">
                    <div class="color-picker-group">
                        <label for="dot-color">QR Dots</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="dot-color" value="#000000">
                        </div>
                    </div>
                    <div class="color-picker-group">
                        <label for="bg-color">QR Background</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="bg-color" value="#ffffff">
                        </div>
                    </div>
                </div>

                <!-- Template Section -->
                <div class="section-title">Select Template</div>
                <div class="template-selector">
                    <div class="template-option active" data-template="minimalist">
                        <div class="template-preview minimalist-preview"></div>
                        <span>Minimalist</span>
                    </div>
                    <div class="template-option" data-template="savage">
                        <div class="template-preview savage-preview"></div>
                        <span>Savage Neon</span>
                    </div>
                    <div class="template-option" data-template="artdeco">
                        <div class="template-preview artdeco-preview"></div>
                        <span>Art Deco Gold</span>
                    </div>
                </div>

                <!-- Poster Text Section -->
                <div class="section-title">Poster Text</div>
                <div class="input-group">
                    <label for="poster-title">Top Title</label>
                    <input type="text" id="poster-title" class="form-input" placeholder="e.g. SCAN TO CONNECT" value="SCAN TO CONNECT" maxlength="30">
                </div>
                <div class="input-group">
                    <label for="poster-subtitle">Bottom Subtitle</label>
                    <input type="text" id="poster-subtitle" class="form-input" placeholder="e.g. Point your camera at the code" value="Point your camera at the code" maxlength="50">
                </div>
            </aside>

            <!-- Preview Panel -->
            <main class="preview-panel">
                <div class="preview-container">
                    <p class="preview-hint">Live Preview</p>
                    
                    <!-- Hidden div for library to generate the raw QR code -->
                    <div id="qr-code-raw" style="display: none;"></div>
                    
                    <!-- Visible canvas where the template + QR are drawn -->
                    <canvas id="poster-canvas" width="800" height="800"></canvas>

                    <!-- Centralized Action Station under Canvas -->
                    <div class="preview-actions">
                        <button id="generate-btn" class="primary-btn">Generate Preview</button>
                        <button id="download-btn" class="secondary-btn" style="display: none;">Download Poster</button>
                    </div>
                </div>
            </main>
        </div>

    </div>

    <script src="env.config.example.js"></script>
    <script src="env.config.js"></script>
    <script src="supabase.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="auth-utils.js"></script>
    <script src="app.js"></script>
</body>
</html>
